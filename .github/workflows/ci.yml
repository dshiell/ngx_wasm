name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout ngx_wasm
        uses: actions/checkout@v4

      - name: Checkout nginx
        uses: actions/checkout@v4
        with:
          repository: nginx/nginx
          path: nginx

      - name: Cache Wasmtime C API
        uses: actions/cache@v4
        with:
          path: third_party/wasmtime-*
          key: ${{ runner.os }}-wasmtime-${{ hashFiles('Makefile', 'scripts/fetch-wasmtime.sh') }}
          restore-keys: |
            ${{ runner.os }}-wasmtime-

      - name: Cache test-nginx checkout
        uses: actions/cache@v4
        with:
          path: third_party/test-nginx
          key: ${{ runner.os }}-test-nginx-${{ hashFiles('Makefile', 'scripts/fetch-test-nginx.sh') }}
          restore-keys: |
            ${{ runner.os }}-test-nginx-

      - name: Cache local Perl deps
        uses: actions/cache@v4
        with:
          path: third_party/perl5
          key: ${{ runner.os }}-perl5-${{ hashFiles('scripts/install-perl-deps.sh') }}
          restore-keys: |
            ${{ runner.os }}-perl5-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-format \
            perl \
            cpanminus \
            curl \
            xz-utils

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cpanminus

      - name: Fetch pinned project dependencies
        run: make deps

      - name: Check formatting
        run: make check-format

      - name: Build
        run: make build NGINX_DIR="${GITHUB_WORKSPACE}/nginx" NGINX_BUILD_JOBS=2

      - name: Build ASan+UBSan variant
        if: runner.os == 'Linux'
        run: make build BUILD_SANITIZE=1 NGINX_DIR="${GITHUB_WORKSPACE}/nginx" NGINX_BUILD_JOBS=2

      - name: Run Test::Nginx suite
        if: runner.os == 'macOS'
        run: make test NGINX_DIR="${GITHUB_WORKSPACE}/nginx"

      - name: Run ASan+UBSan Test::Nginx suite
        if: runner.os == 'Linux'
        run: make test NGINX_DIR="${GITHUB_WORKSPACE}/nginx"
